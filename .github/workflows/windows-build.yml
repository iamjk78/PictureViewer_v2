name: Windows Build

# Triggers:
#   push na main     → build + artifact (ZIP s názvem PictureViewer-dev-windows.zip)
#   push tagu v*.*   → build + artifact + GitHub Release
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:   # umožní spustit workflow ručně z GitHub UI

# Nutné pro krok "Create GitHub Release"
permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows / MSVC x64)
    runs-on: windows-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Instalace Qt 6 (MSVC 2019 64-bit, LTS 6.5.x) ─────────────────
      # Qt 6.5 LTS je nejstabilnější volba pro CI – garantovaná dostupnost
      # v aqt mirrorech. MSVC 2019 binaries jsou plně kompatibilní s
      # kompilátorem MSVC 2022 přítomným na windows-latest runneru.
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtpdf'
          cache: true
          cache-key-prefix: 'qt6-windows-6.8.0-msvc2019'

      # ── 3. MSVC prostředí + CMake konfigurace (Ninja, x64) ────────────────
      # Ninja je nezávislý na verzi Visual Studia na runneru — generátor
      # "Visual Studio 17 2022" přestal fungovat po přechodu windows-latest
      # na image s VS 2026.
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: >
          cmake -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release

      # ── 4. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 5. Příprava dist složky ───────────────────────────────────────────
      # Ninja je single-config — exe je přímo v build\, ne v build\Release\
      - name: Prepare dist folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist_windows | Out-Null
          Copy-Item -Path "build\PictureViewer.exe" -Destination "dist_windows\"

      # ── 6. windeployqt — přibalení Qt DLL ────────────────────────────────
      # Přidá: Qt6Core.dll, Qt6Gui.dll, Qt6Widgets.dll, platforms/, styles/,
      #        imageformats/ a ostatní potřebné závislosti.
      - name: Deploy Qt dependencies (windeployqt)
        shell: pwsh
        run: |
          windeployqt `
            --release `
            --no-translations `
            --no-system-d3d-compiler `
            --no-opengl-sw `
            "dist_windows\PictureViewer.exe"

      # ── 7. Upload jako GitHub Actions artifact ────────────────────────────
      # Dostupné ke stažení ze záložky "Actions" po dobu 30 dní.
      # GitHub Actions automaticky zazipuje obsah dist_windows/ (bez dvojitého zípování)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PictureViewer-windows
          path: dist_windows/
          retention-days: 30

      # ── 8. GitHub Release (pouze při push tagu v*) ───────────────────────
      # Vytvoří Release pojmenovaný podle tagu (např. "v0.2").
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist_windows/*
