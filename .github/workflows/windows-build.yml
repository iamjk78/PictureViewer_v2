name: Windows Build

# Triggers:
#   push na main     → build + artifact (ZIP s názvem PictureViewer-dev-windows.zip)
#   push tagu v*.*   → build + artifact + GitHub Release
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

# Nutné pro krok "Create GitHub Release"
permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows / MSVC x64)
    runs-on: windows-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Instalace Qt 6 (MSVC 2022 64-bit) ─────────────────────────────
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true
          cache-key-prefix: 'qt6-windows-msvc2022'

      # ── 3. CMake konfigurace (Visual Studio 2022, x64) ────────────────────
      - name: Configure CMake
        run: >
          cmake -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_BUILD_TYPE=Release

      # ── 4. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── 5. Příprava dist složky ───────────────────────────────────────────
      - name: Prepare dist folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist_windows | Out-Null
          Copy-Item -Path "build\Release\PictureViewer.exe" -Destination "dist_windows\"

      # ── 6. windeployqt — přibalení Qt DLL ────────────────────────────────
      # Přidá: Qt6Core.dll, Qt6Gui.dll, Qt6Widgets.dll, platforms/, styles/,
      #        imageformats/ a ostatní potřebné závislosti.
      - name: Deploy Qt dependencies (windeployqt)
        shell: pwsh
        run: |
          windeployqt `
            --release `
            --no-translations `
            --no-system-d3d-compiler `
            --no-opengl-sw `
            "dist_windows\PictureViewer.exe"

      # ── 7. Název ZIP souboru ──────────────────────────────────────────────
      # Tag push  → PictureViewer-v0.2-windows
      # Jinak     → PictureViewer-dev-windows
      - name: Set ZIP filename
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/(v[^/]+)$') {
            $tag = $Matches[1]
            "ZIP_NAME=PictureViewer-$tag-windows" | Out-File -Append $env:GITHUB_ENV
          } else {
            "ZIP_NAME=PictureViewer-dev-windows" | Out-File -Append $env:GITHUB_ENV
          }

      # ── 8. Vytvoření ZIP archivu ──────────────────────────────────────────
      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist_windows\*" `
            -DestinationPath "${{ env.ZIP_NAME }}.zip" `
            -Force

      # ── 9. Upload jako GitHub Actions artifact ────────────────────────────
      # Dostupné ke stažení ze záložky "Actions" po dobu 30 dní.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}.zip
          retention-days: 30

      # ── 10. GitHub Release (pouze při push tagu v*) ───────────────────────
      # Vytvoří Release pojmenovaný podle tagu (např. "v0.2") a přiloží ZIP.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}.zip
