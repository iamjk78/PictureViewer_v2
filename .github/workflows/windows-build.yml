name: Windows Build

# Triggers:
#   workflow_dispatch (ruční spuštění z GitHub UI Actions) → build + artifact
#   Automatické triggery VYPNUTY — build se vytváří jen když si ho vyžádáš
on:
  workflow_dispatch:

# Nutné pro krok "Create GitHub Release"
permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows / MSVC x64)
    runs-on: windows-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Instalace Qt 6 přes vcpkg (s Pdf modulem) ─────────────────────
      # vcpkg je Microsoft's C++ package manager, má Qt 6 s kompletním
      # Pdf modulem. Alternativa k aqt, která lépe funguje s komplexními moduly.
      - name: Install Qt 6 via vcpkg
        run: |
          cd C:\vcpkg
          .\vcpkg.exe integrate install
          .\vcpkg.exe install qt6[pdf]:x64-windows --recurse-dependencies

      # ── 3. CMake konfigurace s vcpkg toolchain ─────────────────────────────
      - name: Configure CMake with vcpkg
        run: >
          cmake -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DCMAKE_BUILD_TYPE=Release

      # ── 4. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── 5. Příprava dist složky ───────────────────────────────────────────
      # VS generátor vytváří .exe v build\Release\
      - name: Prepare dist folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist_windows | Out-Null
          Copy-Item -Path "build\Release\PictureViewer.exe" -Destination "dist_windows\"

      # ── 6. windeployqt — přibalení Qt DLL ────────────────────────────────
      # Přidá: Qt6Core.dll, Qt6Gui.dll, Qt6Widgets.dll, platforms/, styles/,
      #        imageformats/ a ostatní potřebné závislosti.
      - name: Deploy Qt dependencies (windeployqt)
        shell: pwsh
        run: |
          windeployqt `
            --release `
            --no-translations `
            --no-system-d3d-compiler `
            --no-opengl-sw `
            "dist_windows\PictureViewer.exe"

      # ── 7. Upload jako GitHub Actions artifact ────────────────────────────
      # Dostupné ke stažení ze záložky "Actions" po dobu 30 dní.
      # GitHub Actions automaticky zazipuje obsah dist_windows/ (bez dvojitého zípování)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PictureViewer-windows
          path: dist_windows/
          retention-days: 30

      # ── 8. GitHub Release (pouze při push tagu v*) ───────────────────────
      # Vytvoří Release pojmenovaný podle tagu (např. "v0.2").
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist_windows/*
