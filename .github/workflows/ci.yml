name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Qt 6 včetně modulu PDF (qtpdf). Concurrent/Network/Widgets/Test jsou
      # součástí základní instalace.
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          modules: 'qtpdf qtmultimedia'
          cache: true

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      # Zkopírovat exe + Qt DLL pomocí windeployqt + MSVC runtime DLL, zabalit do ZIP.
      - name: Package
        shell: pwsh
        run: |
          $deployDir = "dist\PictureViewer"
          New-Item -ItemType Directory -Force -Path $deployDir | Out-Null
          Copy-Item "build\Release\PictureViewer.exe" "$deployDir\"

          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations `
              --no-system-d3d-compiler "$deployDir\PictureViewer.exe"

          # Zkopírovat MSVC runtime DLL (msvcp140, vcruntime140) z VC Redist adresáře.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath  = & $vswhere -latest -property installationPath
          $crtDir  = Get-ChildItem "$vsPath\VC\Redist\MSVC\*\x64\*CRT" |
                       Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "CRT dir: $crtDir"
          foreach ($dll in @("msvcp140.dll","vcruntime140.dll","vcruntime140_1.dll")) {
              $src = Join-Path $crtDir $dll
              if (Test-Path $src) { Copy-Item $src "$deployDir\" }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PictureViewer-Windows
          path: dist\PictureViewer
          retention-days: 30
