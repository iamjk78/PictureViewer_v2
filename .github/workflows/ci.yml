name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Qt 6 včetně modulu PDF (qtpdf). Concurrent/Network/Widgets/Test jsou
      # součástí základní instalace.
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          modules: 'qtpdf qtmultimedia'
          cache: true

      # Linux: build Qt Widgets/Gui potřebuje systémové GL/xcb knihovny.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libxkbcommon-dev libvulkan-dev \
            libxcb-cursor0 libxcb-xinerama0

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      # Windows: zkopírovat exe + Qt DLL pomocí windeployqt, zabalit do ZIP.
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $deployDir = "dist\PictureViewer"
          New-Item -ItemType Directory -Force -Path $deployDir | Out-Null
          Copy-Item "build\Release\PictureViewer.exe" "$deployDir\"
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations `
              --no-system-d3d-compiler "$deployDir\PictureViewer.exe"
          Compress-Archive -Path $deployDir -DestinationPath "PictureViewer-Windows.zip"

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: PictureViewer-Windows
          path: PictureViewer-Windows.zip
          retention-days: 30
