name: macOS Build

# Triggers:
#   push na main     → build + artifact (DMG)
#   push tagu v*.*   → build + artifact + GitHub Release (s DMG přiloženým)
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:   # umožní spustit workflow ručně z GitHub UI

permissions:
  contents: write

jobs:
  build-macos:
    name: Build (macOS / Clang arm64 + x86_64)
    runs-on: macos-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Instalace Qt 6 (macOS, universal binaries) ─────────────────────
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          cache: true
          cache-key-prefix: 'qt6-macos-6.6.3'

      # ── 3. CMake konfigurace (Release) ────────────────────────────────────
      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      # ── 4. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 5. Vytvoření DMG disk image ───────────────────────────────────────
      - name: Create DMG installer
        run: |
          cd build
          # Vytvořit dočasný adresář pro DMG obsah
          mkdir -p dmg_content
          cp -r PictureViewer.app dmg_content/

          # Vytvořit symlink na Applications pro drag-and-drop instalaci
          ln -s /Applications dmg_content/Applications

          # Vytvořit DMG (UDBZ = gzip komprese, nejkompatibilnější)
          hdiutil create -volname "PictureViewer" \
                         -srcfolder dmg_content \
                         -ov -format UDBZ \
                         -o PictureViewer-macos.dmg

          # Přesunout DMG do rootu pro artifact upload
          mv PictureViewer-macos.dmg ..

      # ── 6. Upload jako GitHub Actions artifact ────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PictureViewer-macos-dmg
          path: build/PictureViewer-macos.dmg
          retention-days: 30

      # ── 7. GitHub Release (pouze při push tagu v*) ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: build/PictureViewer-macos.dmg
