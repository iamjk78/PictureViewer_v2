name: Release

# Publikace nové verze: push tagu vX.Y (např. v0.16) vytvoří GitHub Release
# s Windows instalátorem a SHA256SUMS.txt. Na tento release se odkazuje
# funkce automatické aktualizace v aplikaci (UpdateChecker).

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release-windows:
    name: Build installer & create release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Verze z tagu (v0.16 → 0.16) + kontrola shody s CMakeLists.txt.
      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $cmake = Get-Content CMakeLists.txt -Raw
          if ($cmake -notmatch [regex]::Escape("VERSION $version")) {
            Write-Error "Tag $env:GITHUB_REF_NAME does not match project VERSION in CMakeLists.txt. Bump the version and re-tag."
            exit 1
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          modules: 'qtpdf qtmultimedia'
          cache: true

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          $deployDir = "dist\PictureViewer"
          New-Item -ItemType Directory -Force -Path $deployDir | Out-Null
          Copy-Item "build\Release\PictureViewer.exe" "$deployDir\"

          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations `
              --no-system-d3d-compiler "$deployDir\PictureViewer.exe"

          # Zkopírovat všechny MSVC runtime DLL z VC Redist CRT adresáře.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath  = & $vswhere -latest -property installationPath
          $crtDir  = Get-ChildItem "$vsPath\VC\Redist\MSVC\*\x64\*CRT" |
                       Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
          Get-ChildItem "$crtDir\*.dll" | ForEach-Object { Copy-Item $_.FullName "$deployDir\" }

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
              /DAppVersion=${{ steps.version.outputs.version }} `
              /DSourceDir=..\dist\PictureViewer `
              installer\setup.iss
          Move-Item "installer\output\PictureViewer-Setup.exe" `
                    "PictureViewer-Setup.exe"

      - name: Generate checksums
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "PictureViewer-Setup.exe").Hash.ToLower()
          "$hash  PictureViewer-Setup.exe" | Out-File -Encoding ascii SHA256SUMS.txt
          Get-Content SHA256SUMS.txt

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
              "PictureViewer-Setup.exe" "SHA256SUMS.txt" `
              --title "PictureViewer ${{ steps.version.outputs.version }}" `
              --generate-notes
